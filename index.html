<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Cat - Hosico Game</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            display: block;
            background: linear-gradient(180deg, #0f0f2e 0%, #1a0a3e 100%);
            border: 3px solid #ffd700;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.5);
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #ffd700;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
        }

        #gameOver {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #gameOverContent {
            text-align: center;
            color: #ffd700;
        }

        .gameOverTitle {
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 20px rgba(255, 215, 0, 0.8);
        }

        .finalScore {
            font-size: 32px;
            margin: 20px 0;
        }

        .retryBtn {
            margin-top: 30px;
            padding: 15px 40px;
            font-size: 20px;
            background: linear-gradient(135deg, #ff6b35 0%, #ff8c42 100%);
            color: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 107, 53, 0.6);
        }

        .retryBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 25px rgba(255, 107, 53, 0.8);
        }

        .retryBtn:active {
            transform: scale(0.95);
        }

        #instructions {
            position: absolute;
            bottom: 10px;
            left: 10px;
            color: #aaa;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        <div id="ui">
            <div>Pipes Passed: <span id="score">0</span></div>
        </div>
        <div id="instructions">Tap/Click to Flap</div>
        <div id="gameOver">
            <div id="gameOverContent">
                <div class="gameOverTitle">Game Over!</div>
                <div class="finalScore">Pipes Passed: <span id="finalScore">0</span></div>
                <button class="retryBtn">Play Again</button>
            </div>
        </div>
    </div>

    <script>
        // Initialize Telegram WebApp
        if (typeof Telegram !== 'undefined' && Telegram.WebApp) {
            Telegram.WebApp.expand();
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(err => {});
            }
        }

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameOverScreen = document.getElementById('gameOver');
        const scoreDisplay = document.getElementById('score');
        const finalScoreDisplay = document.getElementById('finalScore');
        const retryBtn = document.querySelector('.retryBtn');

        // Canvas setup
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        // Game variables
        const cat = {
            x: canvas.width * 0.2,
            y: canvas.height / 2,
            width: 40,
            height: 40,
            velocity: 0,
            gravity: 0.5,
            flapPower: -10
        };

        let pipes = [];
        let score = 0;
        let gameRunning = true;
        let particles = [];
        let pipeGap = 120;
        let pipeWidth = 80;
        let pipeSpacing = 200;
        let nextPipeX = canvas.width;
        let gameSpeed = 6;
        let difficulty = 1;

        // Colors
        const catColor = '#ff6b35';
        const pipeColor = '#2a7a3a';
        const starColor = '#ffd700';
        const bgColor = '#0f0f2e';

        // Draw cat
        function drawCat(x, y, rotation = 0) {
            ctx.save();
            ctx.translate(x, y);
            ctx.rotate(rotation);

            // Body
            ctx.fillStyle = catColor;
            ctx.beginPath();
            ctx.arc(0, 0, cat.width * 0.4, 0, Math.PI * 2);
            ctx.fill();

            // Ears
            ctx.beginPath();
            ctx.arc(-cat.width * 0.2, -cat.width * 0.7, cat.width * 0.25, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cat.width * 0.2, -cat.width * 0.7, cat.width * 0.25, 0, Math.PI * 2);
            ctx.fill();

            // Eyes
            ctx.fillStyle = 'white';
            ctx.beginPath();
            ctx.arc(-cat.width * 0.15, -cat.width * 0.1, cat.width * 0.18, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cat.width * 0.15, -cat.width * 0.1, cat.width * 0.18, 0, Math.PI * 2);
            ctx.fill();

            // Pupils
            ctx.fillStyle = 'black';
            ctx.beginPath();
            ctx.arc(-cat.width * 0.1, -cat.width * 0.1, cat.width * 0.08, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.arc(cat.width * 0.2, -cat.width * 0.1, cat.width * 0.08, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();
        }

        // Draw star
        function drawStar(x, y, size) {
            ctx.fillStyle = starColor;
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle = (i * 4 * Math.PI) / 5 - Math.PI / 2;
                const px = x + size * Math.cos(angle);
                const py = y + size * Math.sin(angle);
                if (i === 0) ctx.moveTo(px, py);
                else ctx.lineTo(px, py);
            }
            ctx.closePath();
            ctx.fill();

            ctx.strokeStyle = starColor;
            ctx.lineWidth = 2;
            ctx.globalAlpha = 0.5;
            ctx.stroke();
            ctx.globalAlpha = 1;
        }

        // Particle system
        class Particle {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.vx = (Math.random() - 0.5) * 4;
                this.vy = (Math.random() - 0.5) * 4;
                this.life = 1;
                this.decay = Math.random() * 0.02 + 0.01;
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.1;
                this.life -= this.decay;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 215, 0, ${this.life})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, 3, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function createParticles(x, y) {
            for (let i = 0; i < 12; i++) {
                particles.push(new Particle(x, y));
            }
        }

        // Input handling
        function flap() {
            if (!gameRunning) return;
            cat.velocity = cat.flapPower;
            createParticles(cat.x, cat.y);
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === ' ') {
                e.preventDefault();
                flap();
            }
        });

        canvas.addEventListener('click', flap);
        canvas.addEventListener('touchstart', flap);

        // Game logic
        function update() {
            if (!gameRunning) return;

            // Apply gravity
            cat.velocity += cat.gravity;
            cat.y += cat.velocity;

            // Boundary check
            if (cat.y + cat.width / 2 > canvas.height || cat.y - cat.width / 2 < 0) {
                endGame();
                return;
            }

            // Spawn pipes
            if (nextPipeX <= canvas.width) {
                const gapStart = Math.random() * (canvas.height - pipeGap - 50) + 25;
                pipes.push({
                    x: nextPipeX,
                    gapStart: gapStart,
                    gapEnd: gapStart + pipeGap,
                    scored: false
                });
                nextPipeX += pipeSpacing;
            }

            // Update pipes
            for (let i = pipes.length - 1; i >= 0; i--) {
                pipes[i].x -= gameSpeed;

                // Collision detection
                const catLeft = cat.x - cat.width / 2;
                const catRight = cat.x + cat.width / 2;
                const catTop = cat.y - cat.width / 2;
                const catBottom = cat.y + cat.width / 2;

                if (catRight > pipes[i].x && catLeft < pipes[i].x + pipeWidth) {
                    if (catTop < pipes[i].gapStart || catBottom > pipes[i].gapEnd) {
                        endGame();
                        return;
                    }
                }

                // Scoring
                if (!pipes[i].scored && pipes[i].x + pipeWidth < cat.x) {
                    pipes[i].scored = true;
                    score++;
                    scoreDisplay.textContent = score;
                    difficulty = Math.min(1 + score * 0.05, 2);
                    gameSpeed = 6 + difficulty;
                    pipeGap = Math.max(100, 120 - score * 2);
                    createParticles(canvas.width / 2, canvas.height / 2);
                }

                // Remove off-screen pipes
                if (pipes[i].x < -pipeWidth) {
                    pipes.splice(i, 1);
                }
            }

            // Update particles
            particles = particles.filter(p => p.life > 0);
            particles.forEach(p => p.update());
        }

        function draw() {
            // Clear canvas
            ctx.fillStyle = bgColor;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw background stars
            ctx.fillStyle = 'rgba(255, 215, 0, 0.1)';
            for (let i = 0; i < 30; i++) {
                const x = (i * 213) % canvas.width;
                const y = (i * 567) % canvas.height;
                ctx.beginPath();
                ctx.arc(x, y, 2, 0, Math.PI * 2);
                ctx.fill();
            }

            // Draw pipes
            ctx.fillStyle = pipeColor;
            pipes.forEach(pipe => {
                // Top pipe
                ctx.fillRect(pipe.x, 0, pipeWidth, pipe.gapStart);
                // Bottom pipe
                ctx.fillRect(pipe.x, pipe.gapEnd, pipeWidth, canvas.height - pipe.gapEnd);

                // Pipe glow
                ctx.strokeStyle = 'rgba(255, 215, 0, 0.3)';
                ctx.lineWidth = 3;
                ctx.strokeRect(pipe.x, 0, pipeWidth, pipe.gapStart);
                ctx.strokeRect(pipe.x, pipe.gapEnd, pipeWidth, canvas.height - pipe.gapEnd);
            });

            // Draw cat
            const rotation = (cat.velocity / 15) * (Math.PI / 4);
            drawCat(cat.x, cat.y, rotation);

            // Draw particles
            particles.forEach(p => p.draw());
        }

        function endGame() {
            gameRunning = false;
            stopLoop();
            finalScoreDisplay.textContent = score;
            gameOverScreen.style.display = 'flex';
        }

        function resetGame() {
            cat.y = canvas.height / 2;
            cat.velocity = 0;
            pipes = [];
            score = 0;
            gameSpeed = 6;
            difficulty = 1;
            pipeGap = 120;
            nextPipeX = canvas.width;
            particles = [];
            scoreDisplay.textContent = score;
            gameRunning = true;
            gameOverScreen.style.display = 'none';
            gameLoop();
        }

        retryBtn.addEventListener('click', resetGame);

        let animFrameId = null;

        function gameLoop() {
            update();
            draw();
            animFrameId = requestAnimationFrame(gameLoop);
        }

        function stopLoop() {
            if (animFrameId) {
                cancelAnimationFrame(animFrameId);
                animFrameId = null;
            }
        }

        gameLoop();
    </script>
</body>
</html>
